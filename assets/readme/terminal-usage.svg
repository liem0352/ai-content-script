<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="100%" role="img" aria-labelledby="tuTitle tuDesc">
  <title id="tuTitle">安装与测试入口</title>
  <desc id="tuDesc">Chrome 扩展安装入口与自带测试页地址,在浏览器地址栏直接访问。</desc>

  <defs>
    <style>
      .ff-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .ff-mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="200" rx="14" ry="14" fill="#0F0E17"/>

  <!-- 终端窗口卡片 -->
  <g transform="translate(48 30)">
    <rect x="0" y="0" width="1104" height="140" rx="10" ry="10" fill="#13111C" stroke="#1F1D2E" stroke-width="1"/>

    <!-- 标题条(用文字标识,不用装饰圆点) -->
    <rect x="0" y="0" width="1104" height="32" rx="10" ry="10" fill="#1A1825"/>
    <rect x="0" y="22" width="1104" height="10" fill="#1A1825"/>
    <text x="20" y="20" class="ff-mono" font-size="11" fill="#6B6B7E" letter-spacing="1.5">CHROME · ADDRESS BAR</text>
    <text x="1084" y="20" class="ff-mono" font-size="11" fill="#6B6B7E" letter-spacing="1.5" text-anchor="end">2 ENTRIES</text>

    <!-- 命令 1: 扩展管理页 -->
    <text x="24" y="68" class="ff-mono" font-size="13" fill="#6B6B7E">$</text>
    <text x="40" y="68" class="ff-mono" font-size="13" fill="#E8E4D9">chrome://extensions/</text>
    <text x="220" y="68" class="ff-mono" font-size="11" fill="#3A3850"># 安装入口 · 开启开发者模式</text>

    <!-- 命令 2: 测试页 -->
    <text x="24" y="100" class="ff-mono" font-size="13" fill="#6B6B7E">$</text>
    <text x="40" y="100" class="ff-mono" font-size="13" fill="#E8E4D9">chrome-extension://</text>
    <text x="190" y="100" class="ff-mono" font-size="13" fill="#E8B547">&lt;你的扩展ID&gt;</text>
    <text x="298" y="100" class="ff-mono" font-size="13" fill="#E8E4D9">/test/test.html</text>
    <text x="436" y="100" class="ff-mono" font-size="11" fill="#3A3850"># 自带测试页 · 验证题型识别</text>

    <!-- 提示行 -->
    <text x="24" y="124" class="ff-mono" font-size="11" fill="#6B6B7E">扩展 ID 可在 chrome://extensions/ 卡片上找到</text>
  </g>
</svg>
