<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 140" width="100%" role="img" aria-labelledby="wfTitle wfDesc">
  <title id="wfTitle">MultiAI Answer 工作流程</title>
  <desc id="wfDesc">四个阶段:多 AI 并行、权重投票、结果整合、自动填写。前三阶段电紫描边,最终输出阶段琥珀描边表示投票结果落地。</desc>

  <defs>
    <style>
      .ff-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .ff-mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="140" rx="12" ry="12" fill="#0F0E17"/>

  <!-- 阶段 1: 多 AI 并行 -->
  <g transform="translate(48 40)">
    <rect x="0" y="0" width="220" height="60" rx="8" ry="8" fill="#1A1825" stroke="#7C5CFF" stroke-width="1"/>
    <text x="14" y="24" class="ff-mono" font-size="11" fill="#E8B547" letter-spacing="1">01 · INPUT</text>
    <text x="14" y="48" class="ff-sans" font-size="16" font-weight="600" fill="#E8E4D9">多 AI 并行</text>
  </g>
  <g stroke="#6B6B7E" stroke-width="1" fill="none">
    <line x1="276" y1="70" x2="320" y2="70"/>
  </g>
  <polygon points="328,70 320,66 320,74" fill="#6B6B7E"/>

  <!-- 阶段 2: 权重投票 -->
  <g transform="translate(336 40)">
    <rect x="0" y="0" width="220" height="60" rx="8" ry="8" fill="#1A1825" stroke="#7C5CFF" stroke-width="1"/>
    <text x="14" y="24" class="ff-mono" font-size="11" fill="#E8B547" letter-spacing="1">02 · VOTE</text>
    <text x="14" y="48" class="ff-sans" font-size="16" font-weight="600" fill="#E8E4D9">权重投票</text>
  </g>
  <g stroke="#6B6B7E" stroke-width="1" fill="none">
    <line x1="564" y1="70" x2="608" y2="70"/>
  </g>
  <polygon points="616,70 608,66 608,74" fill="#6B6B7E"/>

  <!-- 阶段 3: 结果整合 -->
  <g transform="translate(624 40)">
    <rect x="0" y="0" width="220" height="60" rx="8" ry="8" fill="#1A1825" stroke="#7C5CFF" stroke-width="1"/>
    <text x="14" y="24" class="ff-mono" font-size="11" fill="#E8B547" letter-spacing="1">03 · MERGE</text>
    <text x="14" y="48" class="ff-sans" font-size="16" font-weight="600" fill="#E8E4D9">结果整合</text>
  </g>
  <g stroke="#6B6B7E" stroke-width="1" fill="none">
    <line x1="852" y1="70" x2="896" y2="70"/>
  </g>
  <polygon points="904,70 896,66 896,74" fill="#6B6B7E"/>

  <!-- 阶段 4: 自动填写(琥珀描边,结果落地) -->
  <g transform="translate(912 40)">
    <rect x="0" y="0" width="240" height="60" rx="8" ry="8" fill="#1A1825" stroke="#E8B547" stroke-width="1"/>
    <text x="14" y="24" class="ff-mono" font-size="11" fill="#E8B547" letter-spacing="1">04 · OUTPUT</text>
    <text x="14" y="48" class="ff-sans" font-size="16" font-weight="600" fill="#E8E4D9">自动填写</text>
  </g>
</svg>
