<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 100" width="100%" role="img" aria-labelledby="ftTitle ftDesc">
  <title id="ftTitle">README MADE WITH · License</title>
  <desc id="ftDesc">README 制作签名,使用 beautify-github-readme skill,MIT License,作者 liem。</desc>

  <defs>
    <style>
      .ff-sans { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "PingFang SC", "Microsoft YaHei", sans-serif; }
      .ff-mono { font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="100" rx="12" ry="12" fill="#0F0E17"/>

  <!-- 左侧:tally motif(5 票计数,项目原生 motif 收尾) -->
  <g transform="translate(56 36)" stroke-linecap="round">
    <line x1="0" y1="0" x2="0" y2="28" stroke="#7C5CFF" stroke-width="2.5"/>
    <line x1="9" y1="0" x2="9" y2="28" stroke="#7C5CFF" stroke-width="2.5"/>
    <line x1="18" y1="0" x2="18" y2="28" stroke="#7C5CFF" stroke-width="2.5"/>
    <line x1="27" y1="0" x2="27" y2="28" stroke="#7C5CFF" stroke-width="2.5"/>
    <line x1="36" y1="0" x2="36" y2="28" stroke="#E8B547" stroke-width="2.5"/>
    <line x1="-4" y1="32" x2="40" y2="-4" stroke="#E8B547" stroke-width="2"/>
  </g>

  <!-- 中部:README MADE WITH 签名 -->
  <g transform="translate(132 32)">
    <text x="0" y="0" class="ff-mono" font-size="11" fill="#6B6B7E" letter-spacing="2.4">README MADE WITH</text>
    <text x="0" y="32" class="ff-sans" font-size="18" font-weight="700" fill="#E8E4D9">beautify-github-readme skill</text>
  </g>

  <!-- 中右:版本号 -->
  <g transform="translate(720 32)">
    <text x="0" y="0" class="ff-mono" font-size="11" fill="#6B6B7E" letter-spacing="2.4">VERSION</text>
    <text x="0" y="32" class="ff-sans" font-size="18" font-weight="700" fill="#7C5CFF">v1.0.4</text>
  </g>

  <!-- 右侧:License + 作者 -->
  <g transform="translate(1144 32)">
    <text x="0" y="0" class="ff-mono" font-size="11" fill="#6B6B7E" letter-spacing="2.4" text-anchor="end">LICENSE · AUTHOR</text>
    <text x="0" y="32" class="ff-sans" font-size="18" font-weight="700" fill="#E8B547" text-anchor="end">MIT · liem</text>
  </g>
</svg>
